# render.yaml — Render Blueprint for SplitShare
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─── Backend API (Web Service) ────────────────────────────────────────────
  - type: web
    name: splitshare-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: splitshare-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value

# ─── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: splitshare-db
    databaseName: splitshare
    user: splitshare_user
    plan: free
